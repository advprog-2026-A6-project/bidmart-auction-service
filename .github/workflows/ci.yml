name: CI

on:
  push:
    branches: [ "staging", "main", "mvp/initial-features" ]
  pull_request:
    branches: [ "staging", "main", "mvp/initial-features" ]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-test-lint-sonar:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate SonarCloud configuration
        run: |
          set -euo pipefail
          test -n "${SONAR_TOKEN}" || (echo "SONAR_TOKEN is not set" && exit 1)
          test -n "${SONAR_PROJECT_KEY}" || (echo "SONAR_PROJECT_KEY is not set" && exit 1)
          test -n "${SONAR_ORGANIZATION}" || (echo "SONAR_ORGANIZATION is not set" && exit 1)

      - name: Test + Lint + Coverage
        run: ./gradlew --no-daemon clean check jacocoTestReport

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=src/main
            -Dsonar.tests=src/test
            -Dsonar.java.binaries=build/classes
            -Dsonar.junit.reportPaths=build/test-results/test
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
            -Dsonar.cpd.exclusions=src/main/java/**/dto/**,src/main/java/**/model/**,src/main/resources/templates/**

  deploy-staging:
    name: Deploy to staging
    needs: build-test-lint-sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging' && vars.ENABLE_STAGING_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Validate staging deploy hook
        run: |
          set -euo pipefail
          test -n "${{ secrets.STAGING_DEPLOY_HOOK_URL }}" || (echo "STAGING_DEPLOY_HOOK_URL is not set" && exit 1)

      - name: Trigger staging deployment
        run: curl -fsSL -X POST "${{ secrets.STAGING_DEPLOY_HOOK_URL }}"

      - name: Optional staging smoke check
        env:
          STAGING_HEALTHCHECK_URL: ${{ secrets.STAGING_HEALTHCHECK_URL }}
        run: |
          if [ -n "${STAGING_HEALTHCHECK_URL:-}" ]; then
            curl -fsSL "${STAGING_HEALTHCHECK_URL}"
          else
            echo "Skip staging smoke check (secret not set)"
          fi

  deploy-production:
    name: Deploy to production
    needs: build-test-lint-sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Heroku deploy secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.HEROKU_API_KEY }}" || (echo "HEROKU_API_KEY is not set" && exit 1)
          test -n "${{ secrets.HEROKU_APP_NAME }}" || (echo "HEROKU_APP_NAME is not set" && exit 1)
          test -n "${{ secrets.HEROKU_EMAIL }}" || (echo "HEROKU_EMAIL is not set" && exit 1)

      - name: Deploy to Heroku production
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: false

      - name: Optional production smoke check
        env:
          PRODUCTION_HEALTHCHECK_URL: ${{ secrets.PRODUCTION_HEALTHCHECK_URL }}
        run: |
          if [ -n "${PRODUCTION_HEALTHCHECK_URL:-}" ]; then
            curl -fsSL "${PRODUCTION_HEALTHCHECK_URL}"
          else
            echo "Skip production smoke check (secret not set)"
          fi

  deploy-preview:
    name: Deploy PR preview
    needs: build-test-lint-sonar
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && vars.ENABLE_PR_PREVIEW_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment:
      name: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Heroku preview deploy secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.HEROKU_API_KEY }}" || (echo "HEROKU_API_KEY is not set" && exit 1)
          test -n "${{ secrets.HEROKU_APP_NAME }}" || (echo "HEROKU_APP_NAME is not set" && exit 1)
          test -n "${{ secrets.HEROKU_EMAIL }}" || (echo "HEROKU_EMAIL is not set" && exit 1)

      - name: Deploy PR preview to Heroku
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: false

  staging-status:
    name: Staging status (deploy on hold)
    needs: build-test-lint-sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    env:
      FRONTEND_STAGING_URL: ${{ vars.FRONTEND_STAGING_URL }}
      BACKEND_STAGING_URL: ${{ vars.BACKEND_STAGING_URL }}
      DATABASE_STAGING_URL: ${{ vars.DATABASE_STAGING_URL }}
    steps:
      - name: Publish staging status note
        run: |
          {
            echo "## Staging deployment status";
            echo "- Deploy is currently on hold (AWS Student/Academy license request issue, update: 19 Feb 2026).";
            echo "- Frontend staging link: ${FRONTEND_STAGING_URL:-not-set}";
            echo "- Backend staging link: ${BACKEND_STAGING_URL:-not-set}";
            echo "- Database staging link: ${DATABASE_STAGING_URL:-not-set}";
            echo "- To re-enable deployment, set repository variable ENABLE_STAGING_DEPLOY=true.";
          } >> "$GITHUB_STEP_SUMMARY"

  production-status:
    name: Production status (deploy on hold)
    needs: build-test-lint-sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PRODUCTION_DEPLOY != 'true'
    runs-on: ubuntu-latest
    env:
      FRONTEND_PRODUCTION_URL: ${{ vars.FRONTEND_PRODUCTION_URL }}
      BACKEND_PRODUCTION_URL: ${{ vars.BACKEND_PRODUCTION_URL }}
      DATABASE_PRODUCTION_URL: ${{ vars.DATABASE_PRODUCTION_URL }}
    steps:
      - name: Publish production status note
        run: |
          {
            echo "## Production deployment status";
            echo "- Deploy is currently on hold (AWS Student/Academy license request issue, update: 19 Feb 2026).";
            echo "- Frontend production link: ${FRONTEND_PRODUCTION_URL:-not-set}";
            echo "- Backend production link: ${BACKEND_PRODUCTION_URL:-not-set}";
            echo "- Database production link: ${DATABASE_PRODUCTION_URL:-not-set}";
            echo "- To re-enable deployment, set repository variable ENABLE_PRODUCTION_DEPLOY=true.";
          } >> "$GITHUB_STEP_SUMMARY"
