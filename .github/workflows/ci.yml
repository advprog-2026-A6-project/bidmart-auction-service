name: CI

on:
  pull_request:
    branches: [ "main", "staging" ]
  push:
    branches: [ "staging" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build, Test, and Code Quality
        run: ./gradlew --no-daemon clean checkstyleMain spotbugsMain test jacocoTestReport

      - name: Prepare Sonar Variables
        run: |
          if [ -n "${{ vars.SONAR_PROJECT_NAME }}" ]; then
            echo "SONAR_PROJECT_NAME=${{ vars.SONAR_PROJECT_NAME }}" >> "$GITHUB_ENV"
          else
            echo "SONAR_PROJECT_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - name: Validate Sonar Config
        run: |
          test -n "${{ secrets.SONAR_TOKEN }}" || (echo "Missing SONAR_TOKEN secret" && exit 1)
          test -n "${{ vars.SONAR_ORG }}" || (echo "Missing SONAR_ORG variable" && exit 1)
          test -n "${{ vars.SONAR_PROJECT_KEY }}" || (echo "Missing SONAR_PROJECT_KEY variable" && exit 1)

      - name: SonarCloud Scan (Gradle)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew --no-daemon sonarqube \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=${{ vars.SONAR_ORG }} \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.projectName=${{ env.SONAR_PROJECT_NAME }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml