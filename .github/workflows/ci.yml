name: CI

on:
  push:
    branches: [ "staging", "main", "mvp/initial-features" ]
  pull_request:
    branches: [ "staging", "main", "mvp/initial-features" ]

permissions:
  contents: read
  pull-requests: read

env:
  ENABLE_STAGING_DEPLOY: ${{ vars.ENABLE_STAGING_DEPLOY }}

jobs:
  build-test-lint-sonar:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate SonarCloud configuration
        run: |
          set -euo pipefail
          test -n "${SONAR_TOKEN}" || (echo "SONAR_TOKEN is not set" && exit 1)
          test -n "${SONAR_PROJECT_KEY}" || (echo "SONAR_PROJECT_KEY is not set" && exit 1)
          test -n "${SONAR_ORGANIZATION}" || (echo "SONAR_ORGANIZATION is not set" && exit 1)

      - name: Test + Lint + Coverage
        run: ./gradlew --no-daemon clean check jacocoTestReport

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=src/main
            -Dsonar.tests=src/test
            -Dsonar.java.binaries=build/classes
            -Dsonar.junit.reportPaths=build/test-results/test
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

  deploy-staging:
    name: Deploy to staging
    needs: build-test-lint-sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging' && env.ENABLE_STAGING_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Validate staging deploy hook
        run: |
          set -euo pipefail
          test -n "${{ secrets.STAGING_DEPLOY_HOOK_URL }}" || (echo "STAGING_DEPLOY_HOOK_URL is not set" && exit 1)

      - name: Trigger staging deployment
        run: curl -fsSL -X POST "${{ secrets.STAGING_DEPLOY_HOOK_URL }}"

      - name: Optional staging smoke check
        if: ${{ secrets.STAGING_HEALTHCHECK_URL != '' }}
        run: curl -fsSL "${{ secrets.STAGING_HEALTHCHECK_URL }}"

  staging-status:
    name: Staging status (deploy on hold)
    needs: build-test-lint-sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    env:
      FRONTEND_STAGING_URL: ${{ vars.FRONTEND_STAGING_URL }}
      BACKEND_STAGING_URL: ${{ vars.BACKEND_STAGING_URL }}
      DATABASE_STAGING_URL: ${{ vars.DATABASE_STAGING_URL }}
    steps:
      - name: Publish staging status note
        run: |
          {
            echo "## Staging deployment status";
            echo "- Deploy is currently on hold (AWS Student/Academy license request issue, update: 19 Feb 2026).";
            echo "- Frontend staging link: ${FRONTEND_STAGING_URL:-not-set}";
            echo "- Backend staging link: ${BACKEND_STAGING_URL:-not-set}";
            echo "- Database staging link: ${DATABASE_STAGING_URL:-not-set}";
            echo "- To re-enable deployment, set repository variable ENABLE_STAGING_DEPLOY=true.";
          } >> "$GITHUB_STEP_SUMMARY"
