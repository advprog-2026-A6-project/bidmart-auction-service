<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Bid Dashboard</title>
</head>
<body>
<h1>Dummy Bid Dashboard</h1>
<p>Data below is fetched from backend service and persisted in database.</p>
<h2>Staging Links (Placeholder)</h2>
<ul>
    <li>Frontend: <span th:text="${frontendStagingUrl}">not-set</span></li>
    <li>Backend: <span th:text="${backendStagingUrl}">not-set</span></li>
    <li>Database: <span th:text="${databaseStagingUrl}">not-set</span></li>
</ul>
<table border="1" cellpadding="8" cellspacing="0">
    <thead>
    <tr>
        <th>ID</th>
        <th>Bidder</th>
        <th>Amount</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="bid : ${bids}">
        <td th:text="${bid.id}">1</td>
        <td th:text="${bid.bidderName}">Alice</td>
        <td th:text="${bid.amount}">150000</td>
    </tr>
    </tbody>
</table>
</body>
</html>
