spring:
  application:
    name: auction
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:h2:mem:testdb}
    username: ${SUPABASE_DB_USERNAME:sa}
    password: ${SUPABASE_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

staging:
  links:
    frontend-url: ${FRONTEND_STAGING_URL:not-set}
    backend-url: ${BACKEND_STAGING_URL:not-set}
    database-url: ${DATABASE_STAGING_URL:not-set}
